<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endermanzinho Hub Premium</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* FUNDO ESPAÇO */
body {
  background: radial-gradient(circle at bottom, #050510 0%, #000000 80%);
  overflow: hidden;
  font-family: monospace;
  color: white;
}

/* CANVAS */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* CONTAINER CENTRAL */
.container {
  position: relative;
  z-index: 2;
  text-align: center;
  margin-top: 80px;
}

/* TITULO */
.title {
  font-size: 32px;
  color: #a020f0;
  text-shadow: 0 0 10px #a020f0, 0 0 30px #a020f0;
  margin-bottom: 40px;
}

/* CARD */
.card {
  background: rgba(0,0,0,0.7);
  border: 1px solid #a020f0;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  margin: auto;
  box-shadow: 0 0 20px rgba(160,32,240,0.5);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-bottom: 15px;
  background: #111;
  color: white;
}

/* BOTÃO */
button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(45deg, purple, violet);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px purple;
}

/* PREMIUM */
#premium {
  display: none;
}

/* BOTÃO COPIAR */
.copy-btn {
  margin-top: 10px;
  background: linear-gradient(45deg, #6a00ff, #b266ff);
}

/* TEXTO KEY */
.key-box {
  margin-top: 15px;
  background: #111;
  padding: 10px;
  border-radius: 8px;
  font-size: 12px;
  word-break: break-all;
}

/* BALÕES */
.balloon {
  position: fixed;
  bottom: -50px;
  font-size: 20px;
  animation: subir 4s linear forwards;
}

@keyframes subir {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}

</style>
</head>

<body>

<canvas id="space"></canvas>

<div class="container">
  <div class="title">✨ Endermanzinho Hub Premium Key ✨</div>

  <div class="card" id="login">
    <input id="keyInput" placeholder="Digite sua key...">
    <button onclick="checkKey()">Validar Key</button>
  </div>

  <div class="card" id="premium">
    <h2>🔥 Premium Liberado</h2>

    <button class="copy-btn" onclick="copiar()">Get Premium Key</button>

    <div class="key-box" id="keyText">
      EndermanPremiumKey[c233861917209={Cframecz82726272782721102913013018172}
    </div>
  </div>
</div>

<script>

/* ===========================
   FUNDO ESPAÇO REAL (CANVAS)
=========================== */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

/* criar estrelas */
for (let i = 0; i < 400; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 1
  });
}

/* animar estrelas */
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.fillRect(s.x, s.y, s.size, s.size);
    s.y += s.speed;

    if (s.y > canvas.height) {
      s.y = 0;
      s.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawStars);
}

drawStars();

/* RESPONSIVO */
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* ===========================
   SISTEMA DE KEY
=========================== */

function checkKey(){
  let key = document.getElementById("keyInput").value;

  if(key === "walft23387={serviços key}"){

    document.getElementById("login").style.display = "none";
    document.getElementById("premium").style.display = "block";

    efeitoBaloes();

  } else {
    alert("Key errada ❌");
  }
}

/* ===========================
   BALÕES
=========================== */

function efeitoBaloes(){
  for(let i=0;i<25;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.innerText = "🎈";
    b.style.left = Math.random()*100+"vw";
    b.style.animationDuration = (Math.random()*2+3)+"s";
    document.body.appendChild(b);

    setTimeout(()=>{ b.remove(); }, 4000);
  }
}

/* ===========================
   COPIAR
=========================== */

function copiar(){
  let texto = document.getElementById("keyText").innerText;

  navigator.clipboard.writeText(texto);

  alert("Copiado 😎");
}

</script>

</body>
</html>
